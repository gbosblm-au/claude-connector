# render.yaml
# Render deployment configuration for claude-connector.
# https://render.com

services:
  - type: web
    name: claude-connector
    runtime: node
    buildCommand: npm install
    startCommand: node src/server-http.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SEARCH_PROVIDER
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NEWS_PROVIDER
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: MCP_API_KEY
        sync: false
      - key: UPLOAD_API_KEY
        sync: false
